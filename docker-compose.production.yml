name: pau-production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pau}
      POSTGRES_USER: ${POSTGRES_USER:-pau}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pau-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pau} -d ${POSTGRES_DB:-pau}"]
      interval: 10s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true

  migrate:
    build:
      context: .
      target: build
      args:
        SOURCE_REVISION: ${SOURCE_REVISION:-unknown}
    env_file:
      - ${ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      target: runner
      args:
        SOURCE_REVISION: ${SOURCE_REVISION:-unknown}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.pau.rule=Host(`${PAU_PUBLIC_HOST:-pau.claricont.com}`)
      - traefik.http.routers.pau.entrypoints=web,websecure
      - traefik.http.routers.pau.tls=true
      - traefik.http.routers.pau.tls.certresolver=mytlschallenge
      - traefik.http.routers.pau.middlewares=pau-secure-headers@docker
      - traefik.http.services.pau.loadbalancer.server.port=3000
      - traefik.http.middlewares.pau-secure-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.pau-secure-headers.headers.STSSeconds=31536000
      - traefik.http.middlewares.pau-secure-headers.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.pau-secure-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.pau-secure-headers.headers.forceSTSHeader=true
    networks:
      - default
      - n8n_default
    security_opt:
      - no-new-privileges:true

volumes:
  pau-postgres:

networks:
  n8n_default:
    external: true
